[graph]
all-features = true

[advisories]
yanked = "warn"
ignore = [
  # Transitive through usvg/fontdb/rustybuzz. There is no safe upgrade available
  # at the time of writing; keep this visible so it can be removed when usvg
  # moves to a maintained font parser stack.
  "RUSTSEC-2026-0192",
  # Same chain: rustybuzz is now flagged unmaintained. usvg 0.47 pins it, so there is
  # nothing to upgrade to. Drop this together with the line above when usvg moves off it.
  "RUSTSEC-2026-0206",
]

[licenses]
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "GPL-3.0-or-later",
  "IJG",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
