name: "Image Optimizer"
description: "Optimize images in place (JPEG/PNG/GIF/WebP/SVG), ImageOptim-style, in CI."
branding:
  icon: "image"
  color: "green"

inputs:
  paths:
    description: "Files, directories, or glob patterns to optimize (space- or newline-separated)."
    required: true
  lossy:
    description: "Enable lossy recompression (true/false)."
    required: false
    default: "false"
  quality:
    description: "Quality 1-100 for lossy encoders (implies lossy)."
    required: false
    default: ""
  recursive:
    description: "Recurse into subdirectories (true/false)."
    required: false
    default: "false"
  strip:
    description: "Metadata policy: all | color | none. Empty = imageopt default (keep color profile, or strip-all when lossy)."
    required: false
    default: ""
  check:
    description: "CI gate: write nothing and fail if any file could be optimized (true/false)."
    required: false
    default: "false"
  dry-run:
    description: "Report only; do not modify files (true/false)."
    required: false
    default: "false"
  json:
    description: "Emit JSON output (true/false)."
    required: false
    default: "false"
  version:
    description: "Release version to download (e.g. v0.1.0) or 'latest'. Empty = the release matching the action ref you pinned (recommended)."
    required: false
    default: ""
  extra-args:
    description: "Additional raw CLI flags appended verbatim."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Optimize images
      shell: bash
      # All inputs are passed via the environment (never interpolated into the
      # script body) so untrusted input can't inject shell commands.
      env:
        GH_TOKEN: ${{ github.token }}
        IO_REPO: ${{ github.action_repository }}
        IO_REF: ${{ github.action_ref }}
        IO_VERSION: ${{ inputs.version }}
        IO_PATHS: ${{ inputs.paths }}
        IO_EXTRA: ${{ inputs.extra-args }}
        IO_LOSSY: ${{ inputs.lossy }}
        IO_QUALITY: ${{ inputs.quality }}
        IO_RECURSIVE: ${{ inputs.recursive }}
        IO_STRIP: ${{ inputs.strip }}
        IO_CHECK: ${{ inputs.check }}
        IO_DRYRUN: ${{ inputs.dry-run }}
        IO_JSON: ${{ inputs.json }}
      run: |
        set -eo pipefail

        os=$(uname -s); arch=$(uname -m)
        case "$os-$arch" in
          Linux-x86_64)              target=x86_64-unknown-linux-gnu ;;
          Linux-aarch64|Linux-arm64) target=aarch64-unknown-linux-gnu ;;
          Darwin-arm64)              target=aarch64-apple-darwin ;;
          Darwin-x86_64)             target=x86_64-apple-darwin ;;
          *) echo "::error::Unsupported runner $os-$arch (use a Linux or macOS runner)"; exit 1 ;;
        esac

        repo="${IO_REPO:-newmatik/image-optimizer}"
        # Pick the binary version: an explicit input wins; otherwise prefer the
        # pinned action ref *only if it is a real release tag* (it can also be a
        # branch or SHA, which has no matching release), else fall back to latest.
        ver="$IO_VERSION"
        if [ -z "$ver" ]; then
          if [ -n "$IO_REF" ] && gh release view "$IO_REF" --repo "$repo" >/dev/null 2>&1; then
            ver="$IO_REF"
          else
            ver="latest"
          fi
        fi

        dir="$RUNNER_TEMP/imageopt"
        mkdir -p "$dir"
        pattern="imageopt-*-${target}.tar.gz"
        echo "Downloading $pattern from $repo ($ver)…"
        if [ "$ver" = "latest" ]; then
          gh release download --repo "$repo" --pattern "$pattern" --dir "$dir"
        else
          gh release download "$ver" --repo "$repo" --pattern "$pattern" --dir "$dir"
        fi

        tar -xzf "$dir"/*.tar.gz -C "$dir"
        bin=$(find "$dir" -name imageopt -type f | head -n1)
        chmod +x "$bin"

        args=()
        [ "$IO_LOSSY" = "true" ] && args+=(--lossy)
        [ -n "$IO_QUALITY" ] && args+=(--quality "$IO_QUALITY")
        [ "$IO_RECURSIVE" = "true" ] && args+=(--recursive)
        [ "$IO_CHECK" = "true" ] && args+=(--check)
        [ "$IO_DRYRUN" = "true" ] && args+=(--dry-run)
        [ "$IO_JSON" = "true" ] && args+=(--json)
        [ -n "$IO_STRIP" ] && args+=(--strip "$IO_STRIP")

        # Split paths/extra-args on whitespace (incl. newlines) into separate,
        # quoted arguments: the shell never expands globs/metacharacters —
        # imageopt does its own glob expansion.
        read -r -a path_args <<< "${IO_PATHS//$'\n'/ }"
        read -r -a extra_args <<< "${IO_EXTRA//$'\n'/ }"
        if [ "${#path_args[@]}" -eq 0 ]; then
          echo "::error::No paths provided"; exit 1
        fi

        "$bin" "${args[@]}" "${extra_args[@]}" "${path_args[@]}"
