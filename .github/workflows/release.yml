name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
        with:
          # Build from the requested tag (workflow_dispatch can run from any
          # ref), and don't leave the job token in .git/config for cargo build.
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false

      - name: Resolve tag
        id: tag
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: echo "tag=${INPUT_TAG:-$REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Verify tag matches crate version
        shell: bash
        run: |
          set -euo pipefail
          version="$(cargo pkgid -p imageopt | awk -F# '{print $2}')"
          expected="v$version"
          actual="${{ steps.tag.outputs.tag }}"
          if [ "$actual" != "$expected" ]; then
            echo "::error::Release tag $actual does not match crate version $version"
            exit 1
          fi

      - name: Install nasm (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Install nasm (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm

      - name: Install nasm (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install nasm -y
          echo "C:\Program Files\NASM" >> $env:GITHUB_PATH

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Test
        run: cargo test --all-features

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin imageopt

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          name="imageopt-${{ steps.tag.outputs.tag }}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/imageopt" "dist/$name/"
          cp README.md LICENSE "dist/$name/" 2>/dev/null || true
          tar -C dist -czf "dist/$name.tar.gz" "$name"
          (cd dist && shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256")

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "imageopt-${{ steps.tag.outputs.tag }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/imageopt.exe" "dist/$name/"
          Copy-Item README.md,LICENSE "dist/$name/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"
          $hash = (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File "dist/$name.zip.sha256" -Encoding ascii

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: imageopt-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
