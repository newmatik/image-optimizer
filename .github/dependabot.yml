# Grouped Dependabot: one batched PR per ecosystem per week, not one per package.
version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      cargo:
        applies-to: version-updates
        patterns: ["*"]
      cargo-security:
        applies-to: security-updates
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]
    ignore:
      # dtolnay/rust-toolchain is pinned to the MSRV from Cargo.toml (rust-version), not to
      # an action release. Dependabot reads that pin as an action tag and "bumps" it to a
      # Rust version that does not exist (it proposed 1.100.0), which both breaks the job and
      # defeats the point of the MSRV gate. The pin moves when the MSRV moves — by hand.
      - dependency-name: "dtolnay/rust-toolchain"
